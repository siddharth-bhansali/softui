<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A2440"/>
      <stop offset="100%" stop-color="#1E1A30"/>
    </linearGradient>
    <filter id="inset">
      <feFlood flood-color="rgba(255,255,255,0.12)" result="light"/>
      <feComposite in="light" in2="SourceGraphic" operator="in" result="light-in"/>
      <feOffset in="light-in" dx="-1" dy="-1" result="light-shift"/>
      <feFlood flood-color="rgba(0,0,0,0.4)" result="shadow"/>
      <feComposite in="shadow" in2="SourceGraphic" operator="in" result="shadow-in"/>
      <feOffset in="shadow-in" dx="1" dy="1" result="shadow-shift"/>
      <feMerge>
        <feMergeNode in="SourceGraphic"/>
        <feMergeNode in="shadow-shift"/>
        <feMergeNode in="light-shift"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <text x="16" y="23" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="21" fill="#A78BFA" filter="url(#inset)">S</text>
</svg>
